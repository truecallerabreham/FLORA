<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Forla multi-agent framework architecture banner</title>
  <desc id="desc">A stylized architecture diagram showing model, tools, memory, middleware, orchestration, workflow, and evaluation around Forla.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.42" stop-color="#10243A"/>
      <stop offset="1" stop-color="#12312F"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="72" x2="1030" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#F9A8D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <path d="M0 288C170 238 276 322 446 268C591 222 658 112 826 126C966 137 1056 236 1200 194V360H0V288Z" fill="url(#accent)" opacity="0.16"/>
  <path d="M118 90H1082" stroke="url(#accent)" stroke-width="2" opacity="0.38"/>
  <path d="M118 270H1082" stroke="url(#accent)" stroke-width="2" opacity="0.24"/>

  <g filter="url(#shadow)">
    <rect x="450" y="86" width="300" height="188" rx="24" fill="#0F172A" stroke="url(#accent)" stroke-width="2"/>
    <text x="600" y="156" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Forla</text>
    <text x="600" y="194" text-anchor="middle" fill="#B6C6D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">transparent agent runtime</text>
    <text x="600" y="228" text-anchor="middle" fill="#7DD3FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">model + tools + memory</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="88" y="70" width="190" height="62" rx="18" fill="#0B1220" stroke="#38BDF8" stroke-opacity="0.75"/>
    <text x="183" y="106" text-anchor="middle" fill="#E0F2FE">Typed Messages</text>

    <rect x="88" y="206" width="190" height="62" rx="18" fill="#0B1220" stroke="#2DD4BF" stroke-opacity="0.75"/>
    <text x="183" y="242" text-anchor="middle" fill="#CCFBF1">Middleware</text>

    <rect x="322" y="36" width="190" height="62" rx="18" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.75"/>
    <text x="417" y="72" text-anchor="middle" fill="#DBEAFE">Model Clients</text>

    <rect x="322" y="262" width="190" height="62" rx="18" fill="#0B1220" stroke="#5EEAD4" stroke-opacity="0.75"/>
    <text x="417" y="298" text-anchor="middle" fill="#CCFBF1">Tools</text>

    <rect x="688" y="36" width="190" height="62" rx="18" fill="#0B1220" stroke="#A78BFA" stroke-opacity="0.75"/>
    <text x="783" y="72" text-anchor="middle" fill="#EDE9FE">Memory</text>

    <rect x="688" y="262" width="190" height="62" rx="18" fill="#0B1220" stroke="#F0ABFC" stroke-opacity="0.75"/>
    <text x="783" y="298" text-anchor="middle" fill="#FAE8FF">Evaluation</text>

    <rect x="922" y="70" width="190" height="62" rx="18" fill="#0B1220" stroke="#93C5FD" stroke-opacity="0.75"/>
    <text x="1017" y="106" text-anchor="middle" fill="#DBEAFE">Orchestration</text>

    <rect x="922" y="206" width="190" height="62" rx="18" fill="#0B1220" stroke="#67E8F9" stroke-opacity="0.75"/>
    <text x="1017" y="242" text-anchor="middle" fill="#CFFAFE">Workflows</text>
  </g>

  <g stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.68">
    <path d="M278 101C342 101 376 128 450 150"/>
    <path d="M278 237C348 229 389 209 450 194"/>
    <path d="M512 82C532 96 548 104 566 112"/>
    <path d="M512 293C540 274 552 252 568 236"/>
    <path d="M688 82C670 98 654 106 635 116"/>
    <path d="M688 293C660 274 648 252 632 236"/>
    <path d="M750 150C817 126 854 101 922 101"/>
    <path d="M750 194C815 210 852 229 922 237"/>
  </g>
</svg>
